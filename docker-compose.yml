services:

  postgres:
    image: postgres:15
    container_name: llm-postgres
    restart: always
    environment:
      POSTGRES_DB: llm_gateway
      POSTGRES_USER: llm_user
      POSTGRES_PASSWORD: llm_password
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: llm-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: